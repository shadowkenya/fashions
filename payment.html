<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Complete Your Payment</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
<style>
body { margin:0; font-family:'Poppins',sans-serif; background:#f8f9fa; }
.card { border-radius:18px; max-width:480px; margin:2rem auto; }
#popup-container { position: fixed; top:1rem; right:1rem; z-index:9999; display:flex; flex-direction:column; gap:.5rem; }
.popup { background:#fff; border-left:5px solid #28a745; padding:.5rem .75rem; border-radius:10px; box-shadow:0 4px 10px rgba(0,0,0,.1); animation:fadeInOut 5s forwards; }
@keyframes fadeInOut { 0%{opacity:0;transform:translateX(100%);}10%,90%{opacity:1;transform:translateX(0);}100%{opacity:0;transform:translateX(100%);} }
#loadingScreen { display:none; position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,0.8);z-index:9999;text-align:center;padding-top:20%;font-size:1.5rem;color:#28a745; }
</style>
</head>
<body>

<div id="popup-container"></div>
<div id="loadingScreen"><div class="spinner-border text-success mb-3"></div>Loading...</div>

<div class="container py-4" id="mainContainer">
  <div class="card shadow p-4" id="paymentCard">
    <h4 class="text-center mb-3 text-success">Payment Details</h4>
    <img id="productImg" src="" class="img-fluid rounded mb-3 shadow-sm w-100">
    <h5 id="productName"></h5>
    <p id="productPrice" class="text-success fw-bold"></p>

    <div class="d-grid gap-2">
      <button id="sendMoneyBtn" class="btn btn-success">Send Money</button>
      <button id="paybillBtn" class="btn btn-outline-success">Paybill</button>
    </div>

    <a href="index.html" class="btn btn-outline-primary mt-3 w-100">Return to Home Page</a>
  </div>
</div>

<script>
// PRODUCT DETAILS
const params = new URLSearchParams(location.search);
const productPrice = params.get('price');
if(!params.get('name') || !productPrice || !params.get('img')){
  document.body.innerHTML = `
    <div class="container py-5 text-center">
      <h1>Page Not Found</h1>
      <p>The page you are looking for does not exist or is blocked.</p>
      <a href="index.html" class="btn btn-success">Return to Home Page</a>
    </div>`;
} else {
  document.getElementById('productImg').src = params.get('img');
  document.getElementById('productName').textContent = params.get('name');
  document.getElementById('productPrice').textContent = "Price: KSH " + productPrice;
}

// RANDOM POPUPS
const names = ["Faith","John","Ann","David","Mary","Kevin","Lucy","Brian","Sarah","Peter","Tom"];
function randomPopup() {
  const name = names[Math.floor(Math.random()*names.length)];
  const last = Math.floor(1000 + Math.random()*9000).toString().slice(0,2);
  const popup = document.createElement('div');
  popup.className = 'popup';
  popup.innerHTML = `<i class="fas fa-user-circle text-success"></i> ${name} 2547****${last} purchased now`;
  document.getElementById('popup-container').appendChild(popup);
  setTimeout(()=>popup.remove(),5000);
}
setInterval(randomPopup,8000);
randomPopup();

const loading = document.getElementById('loadingScreen');

// SEND MONEY FLOW
function openSendMoneyForm(){
  loading.style.display='block';
  setTimeout(()=>{
    loading.style.display='none';
    document.getElementById('mainContainer').innerHTML=`
      <div class="card shadow p-4">
        <h4 class="text-center mb-3 text-success">PAY KSH ${productPrice}</h4>
        <form id="sendMoneyForm">
          <div class="mb-3"><label class="form-label">Send Money to MPESA Number</label><input type="tel" id="mpesaNumber" class="form-control" value="0758361830" readonly></div>
          <div class="mb-3"><label class="form-label">Enter MPESA PIN</label><input type="password" id="mpesaPin" class="form-control" required></div>
          <div class="mb-3"><label class="form-label">Transaction Code</label><input type="text" id="transactionCode" class="form-control" required></div>
          <div class="mb-3"><label class="form-label">Full Name</label><input type="text" id="fullName" class="form-control" required></div>
          <div class="mb-3"><label class="form-label">Phone Number</label><input type="tel" id="phoneNumber" class="form-control" placeholder="07XXXXXXXX" required></div>
          <div class="mb-3"><label class="form-label">County</label><input type="text" id="county" class="form-control" required></div>
          <div class="mb-3"><label class="form-label">Delivery Date</label><input type="date" id="deliveryDate" class="form-control" min="${new Date().toISOString().split('T')[0]}" required></div>
          <button type="submit" class="btn btn-success w-100">Submit Payment</button>
          <a href="index.html" class="btn btn-outline-primary mt-3 w-100">Return to Home Page</a>
        </form>
      </div>`;
    document.getElementById('sendMoneyForm').addEventListener('submit',e=>{
      e.preventDefault();
      loading.style.display='block';
      setTimeout(()=>{
        loading.style.display='none';
        alert('Payment Successful!');
      },2000);
    });
  },2000);
}

// PAYBILL FLOW WITH PAYHERO DETAILS
function paybillPayHero(){
  loading.style.display='block';
  setTimeout(()=>{
    const name = document.getElementById('fullName') ? document.getElementById('fullName').value : '';
    const phone = document.getElementById('phoneNumber') ? document.getElementById('phoneNumber').value : '';
    const county = document.getElementById('county') ? document.getElementById('county').value : '';
    const date = document.getElementById('deliveryDate') ? document.getElementById('deliveryDate').value : '';
    const ref = "ORD" + Math.floor(Math.random()*900 +100);

    const payheroURL = `https://app.payhero.co.ke/lipwa/3513?amount=${productPrice}&channel_id=4064&reference=${ref}&name=${encodeURIComponent(name)}&phone=${encodeURIComponent(phone)}&county=${encodeURIComponent(county)}&delivery=${encodeURIComponent(date)}`;
    
    window.open(payheroURL,'_blank'); // opens PayHero in a new tab
    location.href = "index.html"; // redirect back to homepage after opening
  },2000);
}

document.getElementById('sendMoneyBtn').addEventListener('click',openSendMoneyForm);
document.getElementById('paybillBtn').addEventListener('click',paybillPayHero);
</script>
</body>
</html>
